[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = ["vendor", "third_party", "build", "dist", "venv", "installer-output"]

[tool.ruff.lint]
select = ["F", "E9"]

[tool.ruff.lint.per-file-ignores]
# Pre-existing findings in out-of-scope files (plan 001 forbids editing
# dictate.py / backends/ to satisfy the linter).
"dictate.py" = ["F401"]           # io, queue imported but unused
"backends/whisper_cpp_backend.py" = ["F841"]  # creationflags assigned but unused (Windows-only Popen kwarg)
