name: release

on:
  push:
    tags:
      - 'v*'

env:
  WHISPER_CPP_TAG: v1.8.4

permissions:
  contents: write   # needed by softprops/action-gh-release to upload assets

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Sync version constants with tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v',''
          Write-Host "Tag = $tag, version = $version"
          (Get-Content dictate.py)   -replace '__version__\s*=\s*"[^"]+"', "__version__ = ""$version""" | Set-Content dictate.py
          (Get-Content installer.iss) -replace '#define\s+MyAppVersion\s+"[^"]+"', "#define MyAppVersion    ""$version""" | Set-Content installer.iss
          Write-Host "--- dictate.py version line ---"
          Select-String -Path dictate.py -Pattern '__version__'
          Write-Host "--- installer.iss MyAppVersion line ---"
          Select-String -Path installer.iss -Pattern 'MyAppVersion'

      - name: Cache whisper.cpp Vulkan build
        id: cache-whisper-cpp
        uses: actions/cache@v4
        with:
          path: vendor/whisper-cpp
          key: whisper-cpp-vulkan-${{ env.WHISPER_CPP_TAG }}-windows-x64

      - name: Install Vulkan SDK
        if: steps.cache-whisper-cpp.outputs.cache-hit != 'true'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: latest
          cache: true

      - name: Clone whisper.cpp
        if: steps.cache-whisper-cpp.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          git clone --depth 1 --branch $env:WHISPER_CPP_TAG https://github.com/ggerganov/whisper.cpp third_party/whisper.cpp

      - name: Build whisper-server (Vulkan)
        if: steps.cache-whisper-cpp.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          cmake -S third_party/whisper.cpp -B third_party/whisper.cpp/build `
            -DGGML_VULKAN=1 -DWHISPER_BUILD_SERVER=ON `
            -DCMAKE_BUILD_TYPE=Release -A x64
          cmake --build third_party/whisper.cpp/build --config Release -j

      - name: Copy whisper-server to vendor
        if: steps.cache-whisper-cpp.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path vendor/whisper-cpp | Out-Null
          Copy-Item third_party/whisper.cpp/build/bin/Release/whisper-server.exe vendor/whisper-cpp/
          Get-ChildItem third_party/whisper.cpp/build/bin/Release/*.dll -ErrorAction SilentlyContinue |
            Copy-Item -Destination vendor/whisper-cpp/
          Write-Host "vendor/whisper-cpp contents:"
          Get-ChildItem vendor/whisper-cpp

      - name: Bundle with PyInstaller
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean AriasSTT.spec

      - name: Verify bundle
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\AriasSTT\AriasSTT.exe")) {
            Write-Error "Bundle missing"
            exit 1
          }
          $sizeMB = [math]::Round((Get-ChildItem -Recurse "dist\AriasSTT" | Measure-Object -Sum Length).Sum / 1MB, 1)
          Write-Host "Bundle size: $sizeMB MB"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) {
            Write-Error "ISCC.exe not found after choco install"
            exit 1
          }
          & $iscc installer.iss

      - name: List installer output
        shell: pwsh
        run: Get-ChildItem installer-output

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: installer-output/AriasSTT-Setup-v*.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}
