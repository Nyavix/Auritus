<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AriasSTT — Meeting recording (mockup)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #1c1c1c; font-family: ui-sans-serif, system-ui, sans-serif; }
    .panel { background: #141414; border: 1px solid #2a2a2a; }
    .accent-red { color: #ff6868; }
    .accent-green { color: #00d27a; }
    .accent-amber { color: #f5a524; }
    .pulse-dot { animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.55} }
  </style>
</head>
<body class="min-h-screen text-zinc-200 p-8 space-y-10">

  <!-- Tray states preview -->
  <section class="panel rounded-2xl p-6 max-w-3xl mx-auto">
    <h2 class="text-sm uppercase tracking-wider text-zinc-400 mb-4">Tray icon states</h2>
    <div class="flex items-center gap-8 text-sm">
      <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-blue-400"></span> Idle</div>
      <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full accent-red bg-current pulse-dot"></span> Push-to-talk</div>
      <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full accent-green bg-current pulse-dot"></span> Meeting</div>
      <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full accent-amber bg-current"></span> Transcribing</div>
    </div>
  </section>

  <!-- Overlay during meeting recording -->
  <section class="panel rounded-2xl p-6 max-w-3xl mx-auto">
    <h2 class="text-sm uppercase tracking-wider text-zinc-400 mb-4">Overlay — meeting recording</h2>
    <div class="bg-[#0a0a0a] border border-white/80 rounded-xl px-5 py-3 inline-flex items-center gap-3 w-[320px]">
      <span class="w-2.5 h-2.5 rounded-full accent-green bg-current pulse-dot"></span>
      <span class="text-sm">Meeting recording</span>
      <span class="ml-auto font-mono text-sm" id="timer">00:12:47</span>
    </div>
  </section>

  <!-- State machine controls -->
  <section class="panel rounded-2xl p-6 max-w-3xl mx-auto">
    <h2 class="text-sm uppercase tracking-wider text-zinc-400 mb-4">State machine</h2>
    <div class="flex items-center gap-3 text-sm" id="states">
      <span data-state="idle" class="px-3 py-1 rounded-full border border-zinc-700">idle</span>
      <span class="text-zinc-600">→</span>
      <span data-state="recording" class="px-3 py-1 rounded-full border border-zinc-700">recording</span>
      <span class="text-zinc-600">→</span>
      <span data-state="transcribing" class="px-3 py-1 rounded-full border border-zinc-700">transcribing</span>
      <span class="text-zinc-600">→</span>
      <span data-state="saved" class="px-3 py-1 rounded-full border border-zinc-700">saved</span>
    </div>
    <div class="mt-4 flex gap-2">
      <button onclick="setState('idle')" class="px-3 py-1.5 text-sm border border-zinc-700 rounded hover:border-zinc-500">idle</button>
      <button onclick="setState('recording')" class="px-3 py-1.5 text-sm border border-zinc-700 rounded hover:border-zinc-500">recording</button>
      <button onclick="setState('transcribing')" class="px-3 py-1.5 text-sm border border-zinc-700 rounded hover:border-zinc-500">transcribing</button>
      <button onclick="setState('saved')" class="px-3 py-1.5 text-sm border border-zinc-700 rounded hover:border-zinc-500">saved</button>
    </div>
  </section>

  <!-- Save notification -->
  <section class="panel rounded-2xl p-6 max-w-3xl mx-auto">
    <h2 class="text-sm uppercase tracking-wider text-zinc-400 mb-4">Save notification</h2>
    <div class="bg-zinc-900 border border-zinc-700 rounded-xl p-4 max-w-md">
      <div class="font-medium">AriasSTT</div>
      <div class="text-sm text-zinc-400 mt-1">Meeting transcript saved → Documents\AriasSTT\meetings\…</div>
      <button class="mt-3 text-sm accent-red hover:underline">Open folder</button>
    </div>
  </section>

  <script>
    function setState(s) {
      document.querySelectorAll('#states [data-state]').forEach(el => {
        const on = el.dataset.state === s;
        el.classList.toggle('bg-zinc-800', on);
        el.classList.toggle('border-zinc-400', on);
      });
    }
    setState('recording');
  </script>
</body>
</html>
